name: Publish Docker images

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar el código del repositorio
        uses: actions/checkout@v4

      - name: Iniciar sesión en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Construir y publicar imagen del backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: mathiasvidela/cinematch-backend:latest

      - name: Construir y publicar imagen del frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: mathiasvidela/cinematch-frontend:latest