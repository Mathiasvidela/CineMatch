<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="CineMatch - Sección Watchlist en desarrollo. Muy pronto podrás guardar tus películas favoritas.">
    <title>CineMatch - Watchlist (En Desarrollo)</title>
    <link rel="shortcut icon" href="../src/isotipo.svg" type="image/x-icon">
    <!-- Link root styling -->
    <link rel="stylesheet" href="../style.css">
</head>

<body>

    <!-- Navigation Bar -->
    <header>
        <nav class="navbar" id="main-navbar">
            <a href="../index.html" class="logo" id="logo-brand"><img src="../src/logotipo.svg"
                    alt="CineMatch Logo"></a>
            <ul class="nav-menu" id="navigation-menu">
                <li><a href="../index.html" class="nav-link" id="nav-discover">Home</a></li>
                <li><a href="#" class="nav-link active" id="nav-watchlist">Watchlist</a></li>
            </ul>
            <div style="width: 0; height: 0; display: none;" id="nav-action-placeholder"></div>
        </nav>
    </header>

    <!-- Main Content -->
    <main class="main-content">

        <!-- Background Decor (Floating Neo-brutalist elements) -->
        <!-- Popcorn Card -->
        <div class="floating-card card-star decor-popcorn" aria-hidden="true"
            style="font-size: 2.2rem; background-color: var(--accent-yellow);">
            🍿
        </div>

        <!-- Film Reel Card -->
        <div class="floating-card card-film decor-tape" aria-hidden="true"
            style="width: 75px; height: 85px; color: var(--accent-pink); background-color: #FFFFFF;">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10" />
                <circle cx="12" cy="12" r="3" />
                <path d="M12 2v6" />
                <path d="M12 16v6" />
                <path d="M2 12h6" />
                <path d="M16 12h6" />
            </svg>
        </div>

        <section class="watchlist-container" id="watchlist-section">

            <div class="construction-card">
                <div class="caution-stripe"></div>



                <div class="construction-title-container">
                    <div class="construction-badge">SECCIÓN EN DESARROLLO 🚀</div>
                    <h1 class="construction-title">Watchlist en Rodaje</h1>
                </div>

                <p class="construction-desc">
                    ¡Hola! Actualmente esta sección <strong>no está disponible</strong>.
                </p>



                <!-- Volver Button -->
                <a href="../index.html" class="btn-volver">
                    <!-- Arrow Left Icon -->
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="19" y1="12" x2="5" y2="12" />
                        <polyline points="12 19 5 12 12 5" />
                    </svg>
                    <span>VOLVER A DISCOVER</span>
                </a>

            </div>

        </section>
    </main>

    <!-- Footer Section -->
    <footer class="footer" id="main-footer">
        <a href="../index.html" class="footer-logo" id="footer-brand">CineMatch</a>
        <p class="copyright" id="footer-copyright"></p>
    </footer>

    <script>
        document.getElementById("footer-copyright").textContent = "© " + new Date().getFullYear() + " CineMatch. Built for Mathias Videla";
    </script>
</body>

</html>
