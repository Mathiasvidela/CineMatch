<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="CineMatch - Encontrá la película perfecta para vos en menos de un minuto. Deja de scrollear por horas y empezá a disfrutar.">
    <title>CineMatch - Encontrá qué ver en menos de un minuto</title>
    <link rel="shortcut icon" href="../src/isotipo.svg" type="image/x-icon">
    <!-- Link root styling -->
    <link rel="stylesheet" href="../style.css">
</head>

<body>

    <!-- Navigation Bar -->
    <header>
        <nav class="navbar" id="main-navbar">
            <a href="../index.html" class="logo" id="logo-brand"><img src="../src/logotipo.svg" alt=""></a>
            <ul class="nav-menu" id="navigation-menu">
                <li><a href="../index.html" class="nav-link" id="nav-discover">Home</a></li>
                <li><a href="watchlist.html" class="nav-link" id="nav-watchlist">Watchlist</a></li>
            </ul>
        </nav>
    </header>

    <main class="main-content">
        <!-- Badge pasos -->
        <div class="pasos">
            <div class="badge-yellow" id="badge-step"></div>
        </div>

        <!-- pasos container -->
        <section id="step-container"></section>

        <!-- botones de accion -->
        <div class="step-actions">
            <button class="btn btn-back" id="btn-back">
                ← Atrás
            </button>

            <button class="btn btn-next" id="btn-next">
                Siguiente →
            </button>
        </div>

    </main>

    <!-- Footer Section -->
    <footer class="footer" id="main-footer">
        <a href="../index.html" class="footer-logo" id="footer-brand">CineMatch</a>
        <p class="copyright" id="footer-copyright"></p>
    </footer>

    <script src="../app.js"></script>

</html>
